<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <rect width="100" height="100" fill="#0D0D0D"/>

  <!-- Outer diamond -->
  <polygon
    points="50,4 96,50 50,96 4,50"
    fill="none"
    stroke="#C9A84C"
    stroke-width="2"
  />

  <!-- Inner diamond -->
  <polygon
    points="50,16 84,50 50,84 16,50"
    fill="#0D0D0D"
    stroke="#C9A84C"
    stroke-width="1.5"
  />

  <!-- Corner dots on outer diamond -->
  <circle cx="50" cy="4"  r="3" fill="#C9A84C"/>
  <circle cx="96" cy="50" r="3" fill="#C9A84C"/>
  <circle cx="50" cy="96" r="3" fill="#C9A84C"/>
  <circle cx="4"  cy="50" r="3" fill="#C9A84C"/>

  <!-- V letter -->
  <text
    x="50"
    y="63"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="36"
    font-weight="bold"
    fill="#C9A84C"
  >V</text>
</svg>
